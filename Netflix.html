<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Search App</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#141414;
color:white;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
text-align:center;
}

h1{
margin-bottom:20px;
color:#e50914;
}

.search-box{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:30px;
flex-wrap:wrap;
}

input{
padding:12px;
width:300px;
border:none;
border-radius:5px;
}

button{
padding:12px 20px;
background:#e50914;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#ff1f1f;
}

#loading{
display:none;
font-size:20px;
margin-top:20px;
}

.movies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#222;
border-radius:10px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.error{
color:red;
margin-top:20px;
}
</style>
</head>
<body>

<div class="container">

<h1>🎬 Movie Search App</h1>

<div class="search-box">
<input
type="text"
id="searchInput"
placeholder="Search Movie...">

<button onclick="searchMovie()">
Search
</button>
</div>

<div id="loading">
Loading...
</div>

<div id="error" class="error"></div>

<div id="movies" class="movies"></div>

</div>

<script>

const API_KEY = "YOUR_API_KEY";

async function searchMovie(){

const query =
document.getElementById("searchInput").value;

const moviesDiv =
document.getElementById("movies");

const loading =
document.getElementById("loading");

const error =
document.getElementById("error");

moviesDiv.innerHTML="";
error.innerHTML="";

if(!query){
error.innerHTML="Please enter a movie name.";
return;
}

loading.style.display="block";

try{

const response =
await fetch(
`https://www.omdbapi.com/?s=${query}&apikey=${API_KEY}`
);

const data =
await response.json();

loading.style.display="none";

if(data.Response==="False"){
error.innerHTML=data.Error;
return;
}

data.Search.forEach(movie=>{

moviesDiv.innerHTML += `
<div class="card">

<img src="${movie.Poster}"
alt="${movie.Title}">

<div class="card-body">

<h3>${movie.Title}</h3>

<p>${movie.Year}</p>

</div>

</div>
`;

});

}
catch(err){

loading.style.display="none";

error.innerHTML=
"Something went wrong.";

}

}

</script>

</body>
</html>
